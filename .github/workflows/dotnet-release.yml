name: Publish Dotnet NuGet Package

on:
  push:
    tags:
      - "release/v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-dotnet-package:
    name: Pack and Publish dotnet packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore dotnet/G5e.AzureDevOpsServerMCP.slnx

      - name: Build
        run: dotnet build dotnet/G5e.AzureDevOpsServerMCP.slnx -c Release --no-restore

      - name: Pack all reusable packages
        run: |
          mkdir -p artifacts/nuget
          projects=(
            "dotnet/src/G5e.AzureDevOpsServerMCP.Domain/G5e.AzureDevOpsServerMCP.Domain.csproj"
            "dotnet/src/G5e.AzureDevOpsServerMCP.Application/G5e.AzureDevOpsServerMCP.Application.csproj"
            "dotnet/src/G5e.AzureDevOpsServerMCP.Infrastructure.Configuration/G5e.AzureDevOpsServerMCP.Infrastructure.Configuration.csproj"
            "dotnet/src/G5e.AzureDevOpsServerMCP.Infrastructure.AzureDevOps/G5e.AzureDevOpsServerMCP.Infrastructure.AzureDevOps.csproj"
            "dotnet/src/G5e.AzureDevOpsServerMCP.Tools/G5e.AzureDevOpsServerMCP.Tools.csproj"
            "dotnet/src/G5e.AzureDevOpsServerMCP.AspNetCore/G5e.AzureDevOpsServerMCP.AspNetCore.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet pack "$project" \
              -c Release \
              --no-build \
              -p:ContinuousIntegrationBuild=true \
              -o artifacts/nuget
          done

      - name: Publish package to GitHub Packages
        run: |
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            if [[ "$pkg" == *.snupkg ]]; then
              continue
            fi
            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg