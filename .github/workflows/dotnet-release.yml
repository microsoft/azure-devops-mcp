name: Publish Dotnet NuGet Package

on:
  push:
    tags:
      - "release/v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-dotnet-package:
    name: Pack and Publish G5e.AzureDevOpsServerMCP.AspNetCore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore dotnet/G5e.AzureDevOpsServerMCP.slnx

      - name: Build
        run: dotnet build dotnet/G5e.AzureDevOpsServerMCP.slnx -c Release --no-restore

      - name: Pack AspNetCore package
        run: |
          mkdir -p artifacts/nuget
          dotnet pack dotnet/src/G5e.AzureDevOpsServerMCP.AspNetCore/G5e.AzureDevOpsServerMCP.AspNetCore.csproj \
            -c Release \
            --no-build \
            -p:ContinuousIntegrationBuild=true \
            -o artifacts/nuget

      - name: Publish package to GitHub Packages
        run: |
          shopt -s nullglob
          for pkg in artifacts/nuget/*.nupkg; do
            if [[ "$pkg" == *.snupkg ]]; then
              continue
            fi
            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg